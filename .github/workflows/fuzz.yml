name: Continuous Fuzz
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: macos-15
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        fuzzer: [bluetooth_exploit, mdns_fuzzer, sharingd_fuzzer, rapportd_fuzzer]
    steps:
      - uses: actions/checkout@v4

      - name: Build fuzzer
        run: |
          cd ${{ matrix.fuzzer }}
          chmod +x build.sh
          ./build.sh

      - name: Run fuzzer (5 hours)
        run: |
          cd ${{ matrix.fuzzer }}
          FUZZER=$(find . -name "fuzz_*" -type f -perm +111 | head -1)
          CORPUS=$(find . -name "corpus*" -type d | head -1)
          if [ -z "$CORPUS" ]; then CORPUS=corpus; fi
          mkdir -p crashes
          echo "Running: $FUZZER $CORPUS/"
          timeout 18000 $FUZZER $CORPUS/ \
            -max_len=4096 \
            -timeout=5 \
            -rss_limit_mb=2048 \
            -jobs=3 \
            -workers=3 \
            -artifact_prefix=crashes/ \
            -print_final_stats=1 \
            || true

      - name: Check for crashes
        if: always()
        run: |
          cd ${{ matrix.fuzzer }}
          if ls crashes/crash-* 1>/dev/null 2>&1; then
            echo "CRASHES FOUND!"
            ls -la crashes/
            for f in crashes/crash-*; do xxd "$f" | head -20; done
          elif ls crashes/oom-* 1>/dev/null 2>&1; then
            echo "OOM found:"
            ls -la crashes/oom-*
          else
            echo "No crashes found this run"
          fi

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crashes-${{ matrix.fuzzer }}-${{ github.run_number }}
          path: |
            ${{ matrix.fuzzer }}/crashes/
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload grown corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-${{ matrix.fuzzer }}-${{ github.run_number }}
          path: |
            ${{ matrix.fuzzer }}/corpus*/
          retention-days: 30
          if-no-files-found: ignore
